<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Signing in...</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f3ff;
      color: #4c1d95;
    }
    .msg { text-align: center; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #ddd6fe;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <p>Signing you in...</p>
  </div>
  <script>
    // Parse tokens from the URL hash (set by backend OAuth callback)
    const hash   = window.location.hash.slice(1);
    const params = new URLSearchParams(hash);

    const accessToken  = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const user = {
      id:           params.get('user_id'),
      email:        params.get('email'),
      name:         params.get('name'),
      subscription: params.get('subscription')
    };

    if (accessToken && refreshToken && user.id) {
      // Save tokens to extension storage
      chrome.storage.local.set({
        access_token:  accessToken,
        refresh_token: refreshToken,
        user:          user
      }, () => {
        // Notify the popup that login succeeded
        chrome.runtime.sendMessage({ type: 'LOGIN_SUCCESS', user });
        // Close this tab
        window.close();
      });
    } else {
      document.querySelector('p').textContent = 'Login failed. Please try again.';
      setTimeout(() => window.close(), 2000);
    }
  </script>
</body>
</html>
